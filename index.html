<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to checklist</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png?t=1">
  <meta name="theme-color" content="#18a84d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Checklist">
  <link rel="apple-touch-icon" href="icons/icon-192.png?t=1">
  <link rel="stylesheet" href="styles.css?t=1">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">
        <h1>Text to checklist</h1>
        <div class="header-title-actions">
          <a id="github-link" class="secondary theme-toggle" href="https://github.com/danieldreke/qr-code-generator" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" width="16" height="16" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          </a>
          <button class="secondary theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark</button>
        </div>
      </div>
      <div class="header-actions">
        <div class="view-tabs">
          <button class="view-tab" id="tabText" onclick="switchView('text')">Text</button>
          <button class="view-tab" id="tabChecklist" onclick="switchView('checklist')">Checklist</button>
        </div>
        <button class="secondary" id="undoBtn" onclick="undo()" disabled>Undo</button>
        <button class="secondary" id="redoBtn" onclick="redo()" disabled>Redo</button>
        <button class="secondary theme-toggle" id="checkedToggle" onclick="toggleCheckedVisibility()">Hide checked</button>
        <button class="secondary" onclick="createQrCode()">Show QR code</button>
        <div class="menu-container" id="menuContainer">
          <button class="secondary" id="menuBtn" onclick="toggleMenu()" title="More options">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><circle cx="4" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="16" cy="10" r="1.5"/></svg>
          </button>
          <div class="dropdown" id="dropdown">
            <button class="secondary" data-text-only onclick="pasteFromClipboard(); closeMenu()">Paste</button>
            <button class="secondary" id="toggleCheckboxBtn" data-text-only onclick="toggleCheckboxFormat(); closeMenu()">Toggle [ ]</button>
            <button class="secondary theme-toggle" id="sortBtn" onclick="toggleSort()">Sort A-Z</button>
            <button class="secondary" onclick="copyToClipboard(); closeMenu()">Copy list</button>
            <button class="secondary danger" onclick="clearDone(); closeMenu()">Clear done</button>
            <button class="secondary danger" id="clearBtn" onclick="clearAction()">Clear list</button>
          </div>
        </div>
      </div>
    </div>
    <div class="list-tabs-row">
      <span class="list-tabs-label">Lists</span>
      <div id="listTabs" class="list-tabs"></div>
    </div>
    <div class="layout" id="layout" data-view="text">
      <div class="pane editor">
        <textarea id="input" placeholder="Paste your text here — one item per line" oninput="onTextareaInput(event)"></textarea>
      </div>
      <div class="pane">
        <button class="secondary" data-checklist-only onclick="addItem()" id="addItemBtn">+ Add item</button>
        <div id="list" class="list"></div>
      </div>
    </div>
  </div>

  <div id="qrModal" class="qr-modal" style="display:none" onclick="closeQrCode()">
    <div class="qr-modal-content" onclick="event.stopPropagation()">
      <div id="qrCode"></div>
      <div id="qrText"></div>
      <div class="qr-actions">
        <button class="secondary" onclick="copyQrCode()">Copy QR code</button>
        <button class="secondary" onclick="copyQrText()">Copy text</button>
        <button onclick="closeQrCode()">Close</button>
      </div>
    </div>
  </div>

  <script src="qrcode.min.keeex.js?t=1"></script>
  <script src="script.js?t=1"></script>
</body>
</html>
